# fly.toml app configuration file generated for tcrb-agent-aged-leaf-2429 on 2026-04-19T19:56:30-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tcrb-agent'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_UPDATE_INTERVAL_HOURS = '4'
  NODE_ENV = 'production'
  PORT = '8080'
  REPO_NAME = 'tcrb-site'
  REPO_OWNER = 'Xyphrius'
  SITE_REPO_PATH = '/data/tcrb-site'

[[mounts]]
  source = 'tcrb_agent_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
